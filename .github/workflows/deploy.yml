name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: ai-chat-493603
  REGION: asia-northeast3          # 서울 리전
  SERVICE: todo-app
  IMAGE: asia-northeast3-docker.pkg.dev/ai-chat-493603/todo-repo/todo-app

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write              # Workload Identity Federation용

    steps:
      # ── 1. 소스 체크아웃 ─────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. GCP 인증 ──────────────────────────────────────────
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # ── 3. gcloud 설정 ────────────────────────────────────────
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # ── 4. Docker 인증 ────────────────────────────────────────
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-northeast3-docker.pkg.dev --quiet

      # ── 5. Docker 이미지 빌드 & 푸시 ─────────────────────────
      - name: Build and push image
        run: |
          docker build -t ${{ env.IMAGE }}:${{ github.sha }} -t ${{ env.IMAGE }}:latest .
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      # ── 6. Cloud Run 배포 ─────────────────────────────────────
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --min-instances 0 \
            --max-instances 10 \
            --memory 256Mi \
            --cpu 1 \
            --port 8080 \
            --quiet

      # ── 7. 배포 URL 출력 ─────────────────────────────────────
      - name: Show service URL
        run: |
          gcloud run services describe ${{ env.SERVICE }} \
            --region ${{ env.REGION }} \
            --format "value(status.url)"
